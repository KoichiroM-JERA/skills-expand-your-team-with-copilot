<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Animated Git-branch background -->
    <canvas id="git-background"></canvas>

    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <div id="user-controls">
        <div id="user-status">
          <button id="login-button" class="icon-button">
            <span class="user-icon">👤</span>
            <span>Login</span>
          </button>
          <div id="user-info" class="hidden">
            <span id="display-name"></span>
            <button id="logout-button">Logout</button>
          </div>
        </div>
      </div>
      <div class="header-mascots">
        <img src="https://octodex.github.com/images/original-octocat.png" alt="Original Octocat mascot" title="Original Octocat" />
        <img src="https://octodex.github.com/images/codercat.jpg" alt="Coder Cat mascot" title="Coder Cat" />
        <img src="https://octodex.github.com/images/labtocat.png" alt="Lab Tocat mascot" title="Lab Tocat" />
        <img src="https://octodex.github.com/images/droidtocat.png" alt="Droid Tocat mascot" title="Droid Tocat" />
        <img src="https://octodex.github.com/images/topguntocat.png" alt="Top Gun Tocat mascot" title="Top Gun Tocat" />
      </div>
    </header>

    <main>
      <section id="activities-container">
        <div class="main-content-layout">
          <!-- Left Sidebar for Filters -->
          <aside class="sidebar-filters">
            <h3>Filter Activities</h3>
            <!-- Search Box -->
            <div class="search-box">
              <input
                type="text"
                id="activity-search"
                placeholder="Search activities..."
              />
              <button id="search-button" aria-label="Search">
                <span class="search-icon">🔍</span>
              </button>
            </div>

            <div class="filter-container">
              <div class="filter-label">Filter by category:</div>
              <div class="category-filters" id="category-filters">
                <button class="category-filter active" data-category="all">
                  All
                </button>
                <button class="category-filter" data-category="sports">
                  Sports
                </button>
                <button class="category-filter" data-category="arts">
                  Arts
                </button>
                <button class="category-filter" data-category="academic">
                  Academic
                </button>
                <button class="category-filter" data-category="community">
                  Community
                </button>
                <button class="category-filter" data-category="technology">
                  Technology
                </button>
              </div>
            </div>

            <!-- Day Filter -->
            <div class="filter-container day-filter-container">
              <div class="filter-label">Filter by day:</div>
              <div class="day-filters" id="day-filters">
                <button class="day-filter active" data-day="">All Days</button>
                <button class="day-filter" data-day="Monday">Monday</button>
                <button class="day-filter" data-day="Tuesday">Tuesday</button>
                <button class="day-filter" data-day="Wednesday">
                  Wednesday
                </button>
                <button class="day-filter" data-day="Thursday">Thursday</button>
                <button class="day-filter" data-day="Friday">Friday</button>
                <button class="day-filter" data-day="Saturday">Saturday</button>
                <button class="day-filter" data-day="Sunday">Sunday</button>
              </div>
            </div>

            <!-- Time Filter -->
            <div class="filter-container time-filter-container">
              <div class="filter-label">Filter by time:</div>
              <div class="time-filters">
                <button class="time-filter active" data-time="">
                  All Times
                </button>
                <button class="time-filter" data-time="morning">
                  Before School
                </button>
                <button class="time-filter" data-time="afternoon">
                  After School
                </button>
                <button class="time-filter" data-time="weekend">Weekend</button>
              </div>
            </div>

            <!-- Difficulty Filter -->
            <div class="filter-container difficulty-filter-container">
              <div class="filter-label">Filter by difficulty:</div>
              <div class="difficulty-filters" id="difficulty-filters">
                <button class="difficulty-filter active" data-difficulty="">
                  All
                </button>
                <button class="difficulty-filter" data-difficulty="Beginner">
                  Beginner
                </button>
                <button class="difficulty-filter" data-difficulty="Intermediate">
                  Intermediate
                </button>
                <button class="difficulty-filter" data-difficulty="Advanced">
                  Advanced
                </button>
              </div>
            </div>
          </aside>

          <!-- Activities Content -->
          <div class="activities-content">
            <div id="activities-list">
              <!-- Activities will be loaded here -->
              <p>Loading activities...</p>
            </div>
            <div id="message" class="hidden message"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <!-- Registration Modal -->
    <div id="registration-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Register for <span id="modal-activity-name"></span></h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input
              type="email"
              id="email"
              required
              placeholder="your-email@mergington.edu"
            />
          </div>
          <input type="hidden" id="activity" value="" />
          <button type="submit">Register</button>
        </form>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-login-modal">&times;</span>
        <h3>Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input
              type="text"
              id="username"
              required
              placeholder="Enter your username"
            />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input
              type="password"
              id="password"
              required
              placeholder="Enter your password"
            />
          </div>
          <button type="submit">Login</button>
        </form>
        <div id="login-message" class="hidden message"></div>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      // Animated Git-style branch lines background
      (function () {
        const canvas = document.getElementById("git-background");
        const ctx = canvas.getContext("2d");

        const LANE_COLOR = "rgba(118, 196, 66, 0.18)";
        const NODE_COLOR = "rgba(118, 196, 66, 0.30)";
        const LANE_COUNT = 5;
        const COMMIT_SPACING = 90;  // vertical pixels between commits
        const SCROLL_SPEED = 0.35; // pixels per frame
        const NODE_RADIUS = 4;

        let width, height, laneXPositions;

        function resize() {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
          const margin = width * 0.08;
          const gap = (width - margin * 2) / (LANE_COUNT - 1);
          laneXPositions = Array.from({ length: LANE_COUNT }, (_, i) => margin + i * gap);
        }
        window.addEventListener("resize", resize);
        resize();

        // Pre-generate a sequence of "graph rows"
        // Each row: { lane, mergeFrom (lane index or null), mergeTo (lane index or null) }
        const ROWS = 120;
        const rows = [];
        // Track which lanes are currently "active" (have a branch on them)
        const active = Array(LANE_COUNT).fill(false);
        active[2] = true; // main branch starts active

        for (let i = 0; i < ROWS; i++) {
          const row = { commits: [], connections: [] };

          // Add commits on each active lane
          active.forEach((on, l) => {
            if (on) row.commits.push(l);
          });

          // Randomly branch off from or merge back into active lanes
          const rand = Math.random();
          if (rand < 0.12) {
            // Branch off: pick a random active lane and an adjacent inactive lane
            const activeLanes = active.map((a, i) => (a ? i : -1)).filter((i) => i >= 0);
            const src = activeLanes[Math.floor(Math.random() * activeLanes.length)];
            const candidates = [src - 1, src + 1].filter(
              (l) => l >= 0 && l < LANE_COUNT && !active[l]
            );
            if (candidates.length) {
              const dst = candidates[Math.floor(Math.random() * candidates.length)];
              active[dst] = true;
              row.connections.push({ from: src, to: dst });
            }
          } else if (rand < 0.22) {
            // Merge back: pick a non-main active lane and merge into an adjacent active lane
            const nonMain = active
              .map((a, i) => (a && i !== 2 ? i : -1))
              .filter((i) => i >= 0);
            if (nonMain.length) {
              const src = nonMain[Math.floor(Math.random() * nonMain.length)];
              const candidates = [src - 1, src + 1].filter(
                (l) => l >= 0 && l < LANE_COUNT && active[l] && l !== src
              );
              if (candidates.length) {
                const dst = candidates[Math.floor(Math.random() * candidates.length)];
                active[src] = false;
                row.connections.push({ from: src, to: dst });
              }
            }
          }

          rows.push(row);
        }

        let scrollOffset = 0;

        function drawRow(row, rowY) {
          ctx.lineWidth = 2;
          ctx.strokeStyle = LANE_COLOR;

          // Draw vertical lines for active commits
          row.commits.forEach((lane) => {
            const x = laneXPositions[lane];
            // draw short vertical segment centered on rowY
            ctx.beginPath();
            ctx.moveTo(x, rowY - COMMIT_SPACING / 2);
            ctx.lineTo(x, rowY + COMMIT_SPACING / 2);
            ctx.stroke();

            // Draw commit node
            ctx.beginPath();
            ctx.arc(x, rowY, NODE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = NODE_COLOR;
            ctx.fill();
          });

          // Draw branch/merge connections as curved lines
          row.connections.forEach(({ from, to }) => {
            const x1 = laneXPositions[from];
            const x2 = laneXPositions[to];
            ctx.beginPath();
            ctx.moveTo(x1, rowY);
            ctx.bezierCurveTo(
              x1, rowY - COMMIT_SPACING * 0.4,
              x2, rowY - COMMIT_SPACING * 0.6,
              x2, rowY - COMMIT_SPACING / 2
            );
            ctx.stroke();
          });
        }

        function animate() {
          ctx.clearRect(0, 0, width, height);

          scrollOffset = (scrollOffset + SCROLL_SPEED) % COMMIT_SPACING;

          // Work out which rows are visible and draw them
          const firstRowIndex = Math.floor(scrollOffset / COMMIT_SPACING);
          const visibleRows = Math.ceil(height / COMMIT_SPACING) + 2;

          for (let i = 0; i < visibleRows; i++) {
            const rowIndex = (firstRowIndex + i) % ROWS;
            const rowY = i * COMMIT_SPACING - (scrollOffset % COMMIT_SPACING);
            drawRow(rows[rowIndex], rowY);
          }

          requestAnimationFrame(animate);
        }

        animate();
      })();
    </script>
  </body>
</html>
